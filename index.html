<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deine-Sonnenstrahlen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --sun-yellow: #facc15;
      --sun-orange: #fb923c;
      --soft-purple: #d8b4fe;
      --deep-purple: #6b21a8;
      --bg: #fffbeb;
    }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top right, #fef3c7, #faf5ff 52%, #fff7ed);
      color: #3f3f46;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(216, 180, 254, 0.35);
      box-shadow: 0 12px 30px rgba(251, 146, 60, 0.12), 0 8px 20px rgba(107, 33, 168, 0.08);
    }

    .fade-in {
      animation: fadeIn 0.7s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .chat-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: linear-gradient(180deg, #fdba74, #c084fc);
    }

    .hide {
      display: none !important;
    }
  </style>
</head>
<body class="min-h-screen overflow-hidden">
  <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-orange-100 via-amber-50 to-purple-100 transition-opacity duration-700">
    <div class="relative w-72 h-72 sm:w-80 sm:h-80">
      <svg viewBox="0 0 300 300" class="w-full h-full">
        <defs>
          <linearGradient id="sunset" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#facc15"></stop>
            <stop offset="100%" stop-color="#fb923c"></stop>
          </linearGradient>
        </defs>
        <rect id="shape-screen" fill="url(#sunset)" rx="18"></rect>
        <rect id="shape-cutout" fill="#ffffff" rx="14"></rect>
        <rect id="shape-stand" fill="#d8b4fe"></rect>
        <rect id="shape-neck" fill="#d8b4fe"></rect>
        <rect id="shape-base" fill="#d8b4fe"></rect>
        <rect id="shape-tower" fill="url(#sunset)"></rect>
      </svg>
    </div>
    <h1 class="mt-8 text-3xl font-extrabold tracking-wide bg-gradient-to-r from-yellow-500 via-orange-500 to-purple-500 bg-clip-text text-transparent">Deine-Sonnenstrahlen</h1>
    <p class="mt-2 text-sm sm:text-base text-purple-700 font-semibold">Preparing adaptive translation community...</p>
  </div>

  <header class="sticky top-0 z-30 glass">
    <div class="max-w-6xl mx-auto px-4 py-4 sm:px-6 flex flex-wrap gap-4 justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 shadow-lg flex items-center justify-center">
          <i data-lucide="sun" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-xl sm:text-2xl font-extrabold text-purple-900">Deine-Sonnenstrahlen</h1>
          <p class="text-xs sm:text-sm text-purple-600">Talk about automatic translation challenges</p>
        </div>
      </div>

      <label class="flex items-center gap-2 px-3 py-2 rounded-full bg-white border border-purple-200 shadow-sm">
        <i data-lucide="languages" class="w-4 h-4 text-orange-500"></i>
        <select id="lang-select" class="bg-transparent outline-none text-sm font-semibold text-purple-900">
          <option value="English">English</option>
          <option value="Deutsch">Deutsch</option>
          <option value="Español">Español</option>
          <option value="Français">Français</option>
          <option value="Italiano">Italiano</option>
          <option value="日本語">日本語</option>
        </select>
      </label>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 sm:px-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-88px)] overflow-hidden">
    <section class="lg:col-span-7 glass rounded-3xl overflow-hidden flex flex-col fade-in min-h-[300px]">
      <div class="px-5 py-4 bg-gradient-to-r from-yellow-100 via-orange-100 to-purple-100 border-b border-purple-200 flex flex-wrap justify-between items-center gap-2">
        <h2 class="font-bold text-purple-900 flex items-center gap-2"><i data-lucide="messages-square" class="w-5 h-5 text-orange-500"></i>Community Chat</h2>
        <span id="language-badge" class="text-xs font-semibold text-purple-700 bg-white rounded-full px-3 py-1 border border-purple-200">Language: English</span>
      </div>

      <div id="chat-list" class="flex-1 p-4 sm:p-5 overflow-y-auto chat-scroll space-y-3 bg-white/70"></div>

      <form id="chat-form" class="p-4 border-t border-purple-200 bg-white/80">
        <label for="chat-input" class="text-xs font-semibold text-purple-700">Share a translation issue, nuance, or false friend:</label>
        <div class="mt-2 flex gap-2">
          <input id="chat-input" type="text" maxlength="350" placeholder="Example: The word 'actual' gets mistranslated in Spanish contexts..." class="flex-1 rounded-2xl border border-purple-200 bg-purple-50 px-4 py-3 text-sm text-purple-900 placeholder:text-purple-400 focus:outline-none focus:ring-2 focus:ring-orange-300" required />
          <button class="rounded-2xl bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-4 py-3 font-bold shadow-md hover:shadow-lg transition" type="submit">
            <i data-lucide="send" class="w-4 h-4"></i>
          </button>
        </div>
      </form>
    </section>

    <section class="lg:col-span-5 flex flex-col gap-4 overflow-hidden fade-in" style="animation-delay: .15s;">
      <div class="glass rounded-3xl p-5">
        <div class="flex items-center justify-between gap-2 mb-3">
          <h2 class="font-bold text-purple-900 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-orange-500"></i>Creator Blog</h2>
          <button id="admin-toggle" class="text-purple-500 hover:text-orange-500 transition" title="Creator Login">
            <i data-lucide="lock" class="w-5 h-5"></i>
          </button>
        </div>

        <form id="admin-form" class="hidden space-y-2">
          <input id="admin-password" type="password" placeholder="Creator password" class="w-full rounded-xl border border-purple-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300" />
          <button type="submit" class="w-full rounded-xl bg-purple-600 text-white py-2 text-sm font-semibold hover:bg-purple-700">Unlock blog editor</button>
        </form>

        <form id="blog-form" class="hidden mt-3 space-y-2">
          <input id="blog-title" type="text" placeholder="Blog title" required class="w-full rounded-xl border border-purple-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300" />
          <textarea id="blog-content" rows="4" placeholder="Write a post for your community..." required class="w-full rounded-xl border border-purple-200 bg-white px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-300"></textarea>
          <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-yellow-400 to-orange-500 text-white py-2 text-sm font-bold shadow-sm">Publish post</button>
        </form>
      </div>

      <div id="blog-list" class="flex-1 overflow-y-auto chat-scroll pr-1 space-y-3"></div>
    </section>
  </main>

  <template id="chat-item-template">
    <article class="bg-white border border-purple-100 rounded-2xl p-3 shadow-sm">
      <div class="flex justify-between gap-2 text-xs mb-1">
        <span class="font-semibold text-purple-700">Community member</span>
        <span class="text-purple-400 chat-time"></span>
      </div>
      <p class="text-sm text-zinc-700 chat-text"></p>
      <p class="text-[11px] text-orange-600 mt-2 font-semibold chat-lang"></p>
    </article>
  </template>

  <template id="blog-item-template">
    <article class="glass rounded-2xl p-4">
      <div class="flex justify-between items-start gap-2">
        <h3 class="font-bold text-purple-900 blog-title"></h3>
        <span class="text-[11px] font-semibold text-purple-500 blog-time"></span>
      </div>
      <p class="mt-2 text-sm text-zinc-700 whitespace-pre-wrap blog-content"></p>
    </article>
  </template>

  <script>
    const CHAT_KEY = 'deine_sonnenstrahlen_chat_v1';
    const BLOG_KEY = 'deine_sonnenstrahlen_blog_v1';
    const ADMIN_PASSWORD = 'Sonnenstrahlen-47-47053';

    const state = {
      currentLanguage: 'English',
      adminUnlocked: false,
      chat: JSON.parse(localStorage.getItem(CHAT_KEY) || '[]'),
      blogs: JSON.parse(localStorage.getItem(BLOG_KEY) || '[]')
    };

    function saveState() {
      localStorage.setItem(CHAT_KEY, JSON.stringify(state.chat));
      localStorage.setItem(BLOG_KEY, JSON.stringify(state.blogs));
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleString();
    }

    function renderChat() {
      const list = document.getElementById('chat-list');
      const template = document.getElementById('chat-item-template');
      list.innerHTML = '';

      if (!state.chat.length) {
        list.innerHTML = '<p class="text-sm text-purple-600">No posts yet. Start the first conversation about a translation issue.</p>';
        return;
      }

      state.chat.slice().reverse().forEach((item) => {
        const node = template.content.cloneNode(true);
        node.querySelector('.chat-time').textContent = formatTime(item.createdAt);
        node.querySelector('.chat-text').textContent = item.text;
        node.querySelector('.chat-lang').textContent = `Posted in ${item.language}`;
        list.appendChild(node);
      });
    }

    function renderBlogs() {
      const list = document.getElementById('blog-list');
      const template = document.getElementById('blog-item-template');
      list.innerHTML = '';

      if (!state.blogs.length) {
        list.innerHTML = '<p class="text-sm text-purple-600 px-1">No blog posts yet.</p>';
        return;
      }

      state.blogs.slice().reverse().forEach((post) => {
        const node = template.content.cloneNode(true);
        node.querySelector('.blog-title').textContent = post.title;
        node.querySelector('.blog-time').textContent = formatTime(post.createdAt);
        node.querySelector('.blog-content').textContent = post.content;
        list.appendChild(node);
      });
    }

    function setLanguage(lang) {
      state.currentLanguage = lang;
      document.getElementById('language-badge').textContent = `Language: ${lang}`;
    }

    function initLoadingAnimation() {
      const stages = [
        { screen: [112, 68, 76, 166, 20], cutout: [118, 74, 64, 154, 16], stand: [0, 0, 0, 0], neck: [0, 0, 0, 0], base: [0, 0, 0, 0], tower: [0, 0, 0, 0] },
        { screen: [82, 52, 136, 192, 22], cutout: [88, 58, 124, 180, 16], stand: [0, 0, 0, 0], neck: [0, 0, 0, 0], base: [0, 0, 0, 0], tower: [0, 0, 0, 0] },
        { screen: [38, 58, 224, 138, 10], cutout: [44, 64, 212, 126, 8], stand: [110, 210, 80, 8], neck: [146, 194, 8, 16], base: [0, 0, 0, 0], tower: [0, 0, 0, 0] },
        { screen: [58, 72, 186, 120, 10], cutout: [64, 78, 174, 108, 8], stand: [104, 206, 92, 8], neck: [146, 190, 8, 16], base: [44, 218, 212, 10], tower: [0, 0, 0, 0] },
        { screen: [44, 62, 168, 108, 8], cutout: [50, 68, 156, 96, 6], stand: [104, 192, 72, 8], neck: [136, 176, 8, 16], base: [44, 205, 168, 10], tower: [220, 72, 44, 140] }
      ];

      const nodes = {
        screen: document.getElementById('shape-screen'),
        cutout: document.getElementById('shape-cutout'),
        stand: document.getElementById('shape-stand'),
        neck: document.getElementById('shape-neck'),
        base: document.getElementById('shape-base'),
        tower: document.getElementById('shape-tower')
      };

      const applyRect = (el, values) => {
        el.setAttribute('x', values[0]);
        el.setAttribute('y', values[1]);
        el.setAttribute('width', values[2]);
        el.setAttribute('height', values[3]);
        if (values[4] != null) {
          el.setAttribute('rx', values[4]);
        }
      };

      let idx = 0;
      let loops = 0;
      const tick = () => {
        const stage = stages[idx];
        applyRect(nodes.screen, stage.screen);
        applyRect(nodes.cutout, stage.cutout);
        applyRect(nodes.stand, stage.stand);
        applyRect(nodes.neck, stage.neck);
        applyRect(nodes.base, stage.base);
        applyRect(nodes.tower, stage.tower);

        idx = (idx + 1) % stages.length;
        if (idx === 0) loops += 1;

        if (loops >= 2) {
          clearInterval(timer);
          const overlay = document.getElementById('loading-screen');
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.classList.add('hide');
            document.body.classList.remove('overflow-hidden');
          }, 700);
        }
      };

      tick();
      const timer = setInterval(tick, 900);
    }

    function setupEvents() {
      document.getElementById('lang-select').addEventListener('change', (event) => {
        setLanguage(event.target.value);
      });

      document.getElementById('chat-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        state.chat.push({
          text,
          language: state.currentLanguage,
          createdAt: new Date().toISOString()
        });

        input.value = '';
        saveState();
        renderChat();
      });

      document.getElementById('admin-toggle').addEventListener('click', () => {
        document.getElementById('admin-form').classList.toggle('hidden');
      });

      document.getElementById('admin-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const value = document.getElementById('admin-password').value;
        if (value === ADMIN_PASSWORD) {
          state.adminUnlocked = true;
          document.getElementById('admin-form').classList.add('hidden');
          document.getElementById('blog-form').classList.remove('hidden');
          document.getElementById('admin-password').value = '';
          return;
        }
        alert('Incorrect creator password.');
      });

      document.getElementById('blog-form').addEventListener('submit', (event) => {
        event.preventDefault();
        if (!state.adminUnlocked) return;

        const title = document.getElementById('blog-title').value.trim();
        const content = document.getElementById('blog-content').value.trim();
        if (!title || !content) return;

        state.blogs.push({
          title,
          content,
          createdAt: new Date().toISOString()
        });

        document.getElementById('blog-title').value = '';
        document.getElementById('blog-content').value = '';
        saveState();
        renderBlogs();
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initLoadingAnimation();
      setLanguage(state.currentLanguage);
      renderChat();
      renderBlogs();
      setupEvents();
    });
  </script>
</body>
</html>
